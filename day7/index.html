<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Animation Demo</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>CSS Animation & Transform Demo</h1>

<div class="container">

<div class="card">
<h2>Translate</h2>
<div class="box translate"></div>
<p>Hover the box.</p>
</div>

<div class="card">
<h2>Scale</h2>
<div class="box scale"></div>
<p>Hover the box.</p>
</div>

<div class="card">
<h2>Rotate</h2>
<div class="box rotate"></div>
<p>Hover the box.</p>
</div>

<div class="card">
<h2>Bounce</h2>
<div class="box bounce"></div>
<p>Runs automatically.</p>
</div>

<div class="card">
<h2>Color Animation</h2>
<div class="box color"></div>
<p>Changes color continuously.</p>
</div>

<div class="card">
<h2>Move Animation</h2>
<div class="box move"></div>
<p>Moves left and right.</p>
</div>

</div>

</body>
</html>
